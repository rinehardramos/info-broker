version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: info_broker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  info-broker-api:
    build: .
    environment:
      INFO_BROKER_API_KEY: ${INFO_BROKER_API_KEY:-changeme}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      POSTGRES_DB: info_broker
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-local-model}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-local-embed}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
