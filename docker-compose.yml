version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  info-broker-api:
    build: .
    environment:
      INFO_BROKER_API_KEY: ${INFO_BROKER_API_KEY:-changeme}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      APIFY_DATASET_URL: ${APIFY_DATASET_URL:-}
      POSTGRES_DB: info_broker
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5433
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  qdrant_data:
